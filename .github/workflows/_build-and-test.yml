name: Build and Test

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string
      configuration:
        required: false
        type: string
        default: Release
      extra_args:
        required: false
        type: string
        default: ""
    secrets:
      gitops_pat:
        required: true

permissions:
  contents: read

env:
  ServiceDefaultsVersion: 1.0.82-alpha
  MessagingContractsVersion: 1.0.91-alpha

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Service
        uses: actions/checkout@v5
        with:
          path: service

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore exact package graph
        run: dotnet restore ${{ inputs.solution_file }} -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }} ${{ inputs.extra_args }}
        working-directory: service
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.gitops_pat }}

      - name: Record resolved shared packages
        run: dotnet list ${{ inputs.solution_file }} package --include-transitive --no-restore
        working-directory: service

      - name: Build
        run: dotnet build ${{ inputs.solution_file }} --no-restore --configuration ${{ inputs.configuration }} -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }} ${{ inputs.extra_args }}
        working-directory: service

      - name: Test
        run: dotnet test ${{ inputs.solution_file }} --no-build --no-restore --configuration ${{ inputs.configuration }} --verbosity normal -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }} ${{ inputs.extra_args }}
        working-directory: service
