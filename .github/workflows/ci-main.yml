name: CI - Main

env:
  ServiceDefaultsVersion: 1.0.82-alpha
  MessagingContractsVersion: 1.0.91-alpha

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore Maliev.InvoiceService.slnx -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }}
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

      - name: Build
        run: dotnet build Maliev.InvoiceService.slnx --configuration Release --no-restore -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }}

      - name: Test
        run: dotnet test Maliev.InvoiceService.slnx --configuration Release --no-build --no-restore --verbosity normal -p:ServiceDefaultsVersion=${{ env.ServiceDefaultsVersion }} -p:MessagingContractsVersion=${{ env.MessagingContractsVersion }}
        working-directory: ${{ github.workspace }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: maliev-website

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev
          NUGET_USERNAME=${{ github.actor }} \
          NUGET_PASSWORD=${{ secrets.GITOPS_PAT }} \
            docker build \
            --secret id=nuget_username,env=NUGET_USERNAME \
            --secret id=nuget_password,env=NUGET_PASSWORD \
            --build-arg SERVICE_DEFAULTS_VERSION=${{ env.ServiceDefaultsVersion }} \
            --build-arg MESSAGING_CONTRACTS_VERSION=${{ env.MessagingContractsVersion }} \
            -t asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-prod/maliev-invoice-service:${{ github.sha }} \
            -f Maliev.InvoiceService.Api/Dockerfile .
          docker push asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-prod/maliev-invoice-service:${{ github.sha }}

      - name: Checkout maliev-gitops repository
        uses: actions/checkout@v5
        with:
          repository: MALIEV-Co-Ltd/maliev-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: maliev-gitops

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2


      - name: Update image tag in maliev-gitops using Kustomize
        run: |
          cd maliev-gitops/3-apps/maliev-invoice-service/overlays/production
          kustomize edit set image \
            asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact/maliev-invoice-service=\
          asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-prod/maliev-invoice-service:${{ github.sha }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          PR_BODY: |
            Automated GitOps Update - **PRODUCTION**

            - **Service**: InvoiceService
            - **Environment**: Production
            - **Image Tag**: ${{ github.sha }}
            - **Source Branch**: ${{ github.ref_name }}
            - **Commit**: ${{ github.sha }}

            Updates maliev-invoice-service image in production overlay.
            **WARNING**: This is a production deployment and should be reviewed before merging.
            This PR was automatically created by GitHub Actions.
            Once merged, ArgoCD will automatically sync the changes to the maliev-prod namespace.

            Triggered by: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            Run: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        run: |
          cd maliev-gitops
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Create a new branch for this update
          BRANCH_NAME="invoice-service/prod-${{ github.sha }}"
          git checkout -b $BRANCH_NAME

          # Commit and push changes to the new branch
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(prod): Update InvoiceService image to ${{ github.sha }}"
          git push origin $BRANCH_NAME

          # Create pull request using GitHub CLI
          gh pr create \
            --title "chore(prod): Update invoice-service" \
            --body "$PR_BODY" \
            --base main \
            --head $BRANCH_NAME \
            --repo MALIEV-Co-Ltd/maliev-gitops
