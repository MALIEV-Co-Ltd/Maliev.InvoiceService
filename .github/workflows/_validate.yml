name: Reusable Validation

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget-packages
  ServiceDefaultsVersion: 1.0.82-alpha
  MessagingContractsVersion: 1.0.91-alpha

jobs:
  dependency-packages:
    name: Build exact public-source dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Checkout InvoiceService source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout exact MessagingContracts source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MALIEV-Co-Ltd/Maliev.MessagingContracts
          ref: 0bcd4c704d842211c5ff9bd6b9c4b3aacfcbd8e7
          path: .ci-sources/Maliev.MessagingContracts
          persist-credentials: false

      - name: Checkout exact ServiceDefaults source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MALIEV-Co-Ltd/Maliev.Aspire
          ref: bfb1b3917d7272f779b78f1ca1c60f676184ed4e
          path: .ci-sources/Maliev.Aspire
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Build exact dependency packages
        run: bash scripts/prepare-invoice-ci-packages.sh

      - name: Upload exact dependency packages
        id: upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: invoice-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages/*
          if-no-files-found: error
          include-hidden-files: true
          overwrite: true
          retention-days: 1

  build-and-test:
    name: Release build, test, and audit
    needs: dependency-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Download exact dependency packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: invoice-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages

      - name: Verify dependency artifact integrity
        shell: bash
        env:
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.dependency-packages.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_ARTIFACT_DIGEST"
          printf 'GitHub artifact digest: %s\n' "$EXPECTED_ARTIFACT_DIGEST"
          (cd .ci-packages && sha256sum --check SHA256SUMS)

      - name: Restore exact package graph
        run: dotnet restore Maliev.InvoiceService.slnx --configfile NuGet.PRValidation.Config /p:GITHUB_ACTIONS=true /p:ServiceDefaultsVersion="1.0.82-alpha" /p:MessagingContractsVersion="1.0.91-alpha"

      - name: Record resolved shared packages
        run: dotnet list Maliev.InvoiceService.slnx package --include-transitive --no-restore

      - name: Build
        run: dotnet build Maliev.InvoiceService.slnx --configuration Release --no-restore /p:GITHUB_ACTIONS=true /p:ServiceDefaultsVersion="1.0.82-alpha" /p:MessagingContractsVersion="1.0.91-alpha"

      - name: Test
        run: dotnet test Maliev.InvoiceService.slnx --configuration Release --no-build --no-restore --verbosity normal /p:GITHUB_ACTIONS=true /p:ServiceDefaultsVersion="1.0.82-alpha" /p:MessagingContractsVersion="1.0.91-alpha"

      - name: Audit resolved NuGet graph
        run: dotnet list Maliev.InvoiceService.slnx package --include-transitive --vulnerable --no-restore --configfile NuGet.PRValidation.Config

  container:
    name: Build and scan production image
    needs: dependency-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_TAG: maliev-invoiceservice:pr-validation-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download exact dependency packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: invoice-ci-packages-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-packages

      - name: Verify dependency artifact integrity
        shell: bash
        env:
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.dependency-packages.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_ARTIFACT_DIGEST"
          printf 'GitHub artifact digest: %s\n' "$EXPECTED_ARTIFACT_DIGEST"
          (cd .ci-packages && sha256sum --check SHA256SUMS)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Maliev.InvoiceService.Api/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            dependency_restore_stage=restore-local
            SERVICE_DEFAULTS_VERSION=${{ env.ServiceDefaultsVersion }}
            MESSAGING_CONTRACTS_VERSION=${{ env.MessagingContractsVersion }}

      - name: Validate runtime image metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(docker image inspect "$IMAGE_TAG")"
          test "$(jq -r '.[0].Config.User' <<< "$metadata")" = "app"
          test "$(jq -c '.[0].Config.Entrypoint' <<< "$metadata")" = '["dotnet","Maliev.InvoiceService.Api.dll"]'
          test "$(jq -r '.[0].Config.ExposedPorts | has("8080/tcp")' <<< "$metadata")" = "true"

      - name: Smoke test production image liveness
        shell: bash
        run: |
          set -euo pipefail
          network_name="invoice-smoke-net-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          database_name="invoice-smoke-db-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          application_name="invoice-smoke-app-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm --force "$application_name" "$database_name" >/dev/null 2>&1 || true
            docker network rm "$network_name" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create "$network_name" >/dev/null
          docker run --detach \
            --name "$database_name" \
            --network "$network_name" \
            --env POSTGRES_PASSWORD=invoice-smoke-password \
            --env POSTGRES_DB=InvoiceDb \
            postgres:18-alpine >/dev/null

          for attempt in {1..30}; do
            if docker exec "$database_name" pg_isready --username postgres --dbname InvoiceDb >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "30" ]]; then
              docker logs "$database_name"
              exit 1
            fi
            sleep 1
          done

          docker run --detach \
            --name "$application_name" \
            --network "$network_name" \
            --publish "127.0.0.1:18080:8080" \
            --env ASPNETCORE_ENVIRONMENT=Testing \
            --env "ConnectionStrings__InvoiceDbContext=Host=$database_name;Port=5432;Database=InvoiceDb;Username=postgres;Password=invoice-smoke-password" \
            --env "ConnectionStrings__redis=invoice-smoke-redis:6379" \
            --env "ConnectionStrings__rabbitmq=amqp://guest:guest@invoice-smoke-rabbitmq:5672" \
            --env "CORS__AllowedOrigins__0=http://localhost:3000" \
            --env "Features__FailOpenOnIAMError=true" \
            --env "IAM__RegistrationDelaySeconds=0" \
            "$IMAGE_TAG" >/dev/null

          for attempt in {1..60}; do
            if curl --fail --silent "http://127.0.0.1:18080/invoice/liveness" >/dev/null; then
              exit 0
            fi
            if [[ "$(docker inspect --format '{{.State.Running}}' "$application_name")" != "true" ]]; then
              docker logs "$application_name"
              exit 1
            fi
            sleep 1
          done

          docker logs "$application_name"
          exit 1

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          image-ref: ${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: trivy-sbom.cdx.json
          scanners: vuln
          exit-code: "0"

      - name: Validate SBOM output
        run: test -s trivy-sbom.cdx.json

      - name: Scan image for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          image-ref: ${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  validate:
    needs:
      - dependency-packages
      - build-and-test
      - container
    runs-on: ubuntu-latest
    steps:
      - name: Confirm all validation gates passed
        run: echo "All InvoiceService validation gates passed."
