version: '3.8'

services:
  postgres-test:
    image: postgres:18
    container_name: maliev-invoice-postgres-test
    environment:
      POSTGRES_DB: invoice_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
